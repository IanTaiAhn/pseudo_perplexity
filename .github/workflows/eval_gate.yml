name: Eval Gate

on:
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run regression test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Module form (-m), not `python evaluation/regression_test.py`: the
        # latter puts evaluation/ itself on sys.path instead of the repo
        # root, so `from evaluation.ragas_runner import run` (and every
        # `from agents...`/`from api...` absolute import inside it) fails.
        run: uv run python -m evaluation.regression_test
